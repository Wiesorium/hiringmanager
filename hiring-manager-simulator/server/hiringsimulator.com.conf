# HTTP -> HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name hiringsimulator.com www.hiringsimulator.com;
    return 301 https://$host$request_uri;
}

# HTTPS vHost
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hiringsimulator.com www.hiringsimulator.com;

    root /var/www/hiringsimulator;
    index index.html;

    # TLS – managed by Certbot (filled in after certbot runs)
    ssl_certificate     /etc/letsencrypt/live/hiringsimulator.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hiringsimulator.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    # SPA routing — all paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Asset caching
    location ~* \.(?:js|css|png|jpg|jpeg|webp|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
